# /etc/nginx/sites-available/to-do-list-rpg
#
# rpg.pjsk.kr — Cloudflare 프록시 뒤. 브라우저↔Cloudflare TLS 는 Cloudflare 가 끝낸다.
# 이 서버(오리진)는 Cloudflare Origin 인증서로 443 을 열고, Cloudflare SSL 모드는 Full (strict).
#
# 인증서: /etc/ssl/rpg-origin/origin.crt  (Cloudflare Origin CA, 15년, 갱신 불필요)
# 개인키: /etc/ssl/rpg-origin/origin.key  (서버에서 생성, 밖으로 나간 적 없음)

upstream rpg_app {
    server 127.0.0.1:3002;
    keepalive 32;
}

# 80 은 이 서버의 다른 앱(my-btc-trading)이 default_server 로 갖고 있다.
# rpg.pjsk.kr:80 으로 (혹시) 오리진에 평문이 닿으면 https 로 올려보낸다.
# 정상적으로는 Cloudflare 가 엣지에서 https 로 처리하므로 여기로 오는 일은 드물다.
server {
    listen 80;
    listen [::]:80;
    server_name rpg.pjsk.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rpg.pjsk.kr;

    ssl_certificate     /etc/ssl/rpg-origin/origin.crt;
    ssl_certificate_key /etc/ssl/rpg-origin/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 업로드가 없는 앱이라 크게 잡을 이유가 없다
    client_max_body_size 1m;
    server_tokens off;

    location / {
        proxy_pass http://rpg_app;
        proxy_http_version 1.1;

        # 이 세 줄이 없으면 NextAuth 가 자기 주소를 http 로 착각해
        # OAuth 콜백과 쿠키 secure 판정이 틀어진다.
        # Full(strict) 라 Cloudflare→오리진도 https 이므로 $scheme 은 https 다.
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # AI 퀘스트 생성이 최대 10초 걸린다 (+ 여유).
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}

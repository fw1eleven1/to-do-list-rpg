# /etc/nginx/sites-available/to-do-list-rpg
#
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/to-do-list-rpg
#   sudo ln -s /etc/nginx/sites-available/to-do-list-rpg /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 이 파일은 certbot 을 돌리기 "전" 상태다 (TLS 없음).
# 도메인이 생기면 listen 을 80 으로 되돌리고 server_name 을 도메인으로 바꾼 뒤
# certbot --nginx -d <도메인> 을 돌린다. certbot 이 443 서버 블록과
# 80 → 443 리다이렉트를 알아서 채워 넣는다.
#
# 80 을 쓰지 않는 이유: 이 서버의 IP:80 은 다른 앱(my-btc-trading)이 이미 쓰고 있다.
# 그래서 이 앱은 http://<IP>:8080 으로 노출한다. ufw 에 8080 을 열어야 한다.

upstream rpg_app {
    server 127.0.0.1:3002;
    keepalive 32;
}

server {
    listen 8080;
    listen [::]:8080;
    server_name 141.164.63.179;

    # 업로드가 없는 앱이라 크게 잡을 이유가 없다
    client_max_body_size 1m;

    # 서버 정체를 굳이 알릴 필요 없다
    server_tokens off;

    # /_next/static 을 위한 별도 블록은 두지 않는다.
    # Next 가 이미 해시된 파일명에 immutable 캐시 헤더를 붙여 내려주므로 브라우저 캐시는 그대로 동작한다.
    # (proxy_cache_valid 를 여기 적어도 http 블록에 proxy_cache_path 존이 없으면 아무 일도 하지 않는다 —
    #  캐시가 켜진 줄 착각하기 쉬운 설정이라 아예 뺐다.)

    location / {
        proxy_pass http://rpg_app;
        proxy_http_version 1.1;

        # 이 세 줄이 없으면 NextAuth 가 자기 주소를 http 로 착각해
        # OAuth 콜백과 쿠키 secure 판정이 틀어진다.
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # AI 퀘스트 생성이 최대 10초 걸린다 (+ 여유). 기본 60초면 충분하지만 명시해둔다.
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }
}
